<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>For Adri ❤️</title>

<style>

body{
margin:0;
font-family:system-ui;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff8ac6,#7b8cff);
overflow:hidden;
color:white;
text-align:center;
}

#intro{
position:absolute;
font-size:24px;
animation:fade 4s forwards;
}

@keyframes fade{
0%{opacity:0}
40%{opacity:1}
80%{opacity:1}
100%{opacity:0}
}

.envelope{
display:none;
width:220px;
height:150px;
background:white;
border-radius:12px;
position:relative;
cursor:pointer;
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-bottom:75px solid #ff4d6d;
}

.tap{
position:absolute;
bottom:-35px;
left:50%;
transform:translateX(-50%);
}

.card{
display:none;
background:white;
color:#333;
padding:25px;
border-radius:18px;
width:85%;
max-width:340px;
}

#message{
min-height:140px;
}

.game{
display:none;
}

button{
padding:10px 16px;
border:none;
border-radius:12px;
margin:6px;
font-size:16px;
cursor:pointer;
}

.yes{background:#ff4d6d;color:white}
.no{background:#ccc}

.heart{
position:absolute;
font-size:22px;
color:#ff4d6d;
}

</style>

</head>

<body>

<div id="intro">
Adri… someone special prepared something for you ❤️
</div>

<div class="envelope" id="env" onclick="openCard()"></div>
<div class="tap" id="tap">Tap to open Sonai 💌</div>

<div class="card" id="card">

<h2>Hi Tiyasha ❤️</h2>

<div id="message"></div>

</div>

<div class="game" id="game">

<h2>Catch the hearts Adri ❤️</h2>
<p>Tap 5 hearts</p>

<div id="score">0 / 5</div>

</div>

<div id="final" style="display:none">

<h2>Did this make you smile?</h2>

<button class="yes" onclick="yes()">YES ❤️</button>

<button class="no" id="no" onmouseover="move()">NO 🙈</button>

</div>

<script>

setTimeout(()=>{
document.getElementById("intro").style.display="none"
document.getElementById("env").style.display="block"
},4000)

let text=`Hi Tiyasha...

or should I say my Adri,
my Baban,
my cute Puchki,
my sweet Sonai ❤️

I didn't know the best way
to tell you something...

so I made this little page
just for you.

— Mr. Roy 🙂`

let i=0

function openCard(){

document.getElementById("env").style.display="none"
document.getElementById("tap").style.display="none"
document.getElementById("card").style.display="block"

typing()

}

function typing(){

if(i < text.length){

document.getElementById("message").innerHTML += text.charAt(i)

i++

setTimeout(typing,40)

}else{

setTimeout(startGame,2000)

}

}

function startGame(){

document.getElementById("card").style.display="none"
document.getElementById("game").style.display="block"

}

let score=0

function spawnHeart(){

let h=document.createElement("div")

h.className="heart"

h.innerHTML="❤️"

h.style.left=Math.random()*90+"vw"

h.style.top="0px"

h.onclick=()=>{

score++

document.getElementById("score").innerText=score+" / 5"

h.remove()

if(score>=5){

document.getElementById("game").style.display="none"

document.getElementById("final").style.display="block"

}

}

document.body.appendChild(h)

let fall=setInterval(()=>{

let y=h.offsetTop+5

h.style.top=y+"px"

if(y>window.innerHeight){

h.remove()

clearInterval(fall)

}

},30)

}

setInterval(spawnHeart,1200)

function yes(){

document.body.innerHTML="<h1>Mr. Roy is very happy now ❤️</h1>"

}

function move(){

let b=document.getElementById("no")

b.style.position="absolute"

b.style.left=Math.random()*80+"vw"

b.style.top=Math.random()*80+"vh"

}

</script>

</body>

</html>
